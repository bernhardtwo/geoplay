services:
  ranking-api:
    build: .
    image: geoplay-ranking:latest
    ports:
      - "8000:8000"
    environment:
      GEOPLAY_SERVING_DIR: /app/serving
      GEOPLAY_MODEL_URI: /app/serving/model
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
